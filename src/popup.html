<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookmarkBuddy</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      min-height: 480px;
      max-height: 580px;
      background: #0b1121;
      color: #f1f5f9;
      font-family: 'DM Sans', -apple-system, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .header-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
    }
    .header-title { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
    .header-count { color: #64748b; font-size: 12px; }
    .header-actions { margin-left: auto; display: flex; gap: 4px; }
    .header-actions button {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; color: #94a3b8; cursor: pointer; padding: 6px 8px;
      display: flex; align-items: center; font-size: 11px; gap: 4px;
      font-family: 'DM Sans', sans-serif; transition: all 0.15s;
    }
    .header-actions button:hover { background: rgba(99,102,241,0.15); color: #a5b4fc; }

    .search-bar {
      padding: 10px 18px;
      flex-shrink: 0;
    }
    .search-bar input {
      width: 100%; padding: 8px 12px 8px 34px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; color: #f1f5f9; font-size: 13px; outline: none;
      font-family: 'DM Sans', sans-serif;
    }
    .search-bar input::placeholder { color: #475569; }
    .search-wrap { position: relative; }
    .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: #64748b; display: flex;
    }

    .tabs {
      display: flex; gap: 2px; padding: 0 18px 10px;
      flex-shrink: 0;
    }
    .tab {
      padding: 5px 12px; border-radius: 8px; border: none; cursor: pointer;
      background: transparent; color: #64748b; font-size: 12px; font-weight: 600;
      font-family: 'DM Sans', sans-serif; transition: all 0.15s;
    }
    .tab.active { background: rgba(99,102,241,0.15); color: #a5b4fc; }
    .tab-count {
      display: inline-block; background: rgba(255,255,255,0.06);
      padding: 0px 6px; border-radius: 4px; font-size: 10px; margin-left: 4px;
    }
    .tab.active .tab-count { background: rgba(99,102,241,0.3); }
    .tab-x.active { background: rgba(29,155,240,0.15); color: #1d9bf0; }
    .tab-x .tab-count { background: rgba(29,155,240,0.12); }
    .tab-x.active .tab-count { background: rgba(29,155,240,0.3); }

    .controls {
      display: flex; gap: 6px; padding: 0 18px 10px;
      flex-shrink: 0;
    }
    .controls select {
      padding: 5px 8px; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
      color: #f1f5f9; font-size: 11px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; outline: none;
    }
    .controls select option { background: #1e293b; }

    .bookmark-list {
      flex: 1; overflow-y: auto; padding: 0 18px 12px;
    }
    .bookmark-list::-webkit-scrollbar { width: 6px; }
    .bookmark-list::-webkit-scrollbar-track { background: transparent; }
    .bookmark-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    .bookmark-card {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px; cursor: pointer;
      transition: all 0.15s; border: 1px solid transparent;
      position: relative;
    }
    .bookmark-card:hover { background: rgba(255,255,255,0.04); }
    .bookmark-card .fav-btn {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 4px;
      opacity: 0; transition: opacity 0.15s; display: flex;
    }
    .bookmark-card:hover .fav-btn { opacity: 1; }
    .bookmark-card .fav-btn.is-fav { opacity: 1; }

    .bk-favicon {
      width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0;
      background: #1e293b; display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .bk-favicon img { width: 100%; height: 100%; object-fit: cover; }
    .bk-favicon .fallback {
      font-size: 13px; font-weight: 700; color: #fff;
    }
    .bk-info { flex: 1; min-width: 0; }
    .bk-title {
      font-size: 13px; font-weight: 500; color: #f1f5f9;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.3;
    }
    .bk-title-link { cursor: pointer; }
    .bk-title-link:hover { text-decoration: underline; color: #a5b4fc; }
    .bk-meta {
      display: flex; align-items: center; gap: 6px; margin-top: 2px;
    }
    .bk-domain {
      font-size: 11px; color: #64748b; font-family: 'JetBrains Mono', monospace;
    }
    .bk-category {
      font-size: 10px; padding: 1px 6px; border-radius: 4px;
      font-weight: 500; white-space: nowrap;
    }

    .empty-state {
      text-align: center; padding: 40px 20px; color: #64748b;
    }
    .empty-state .emoji { font-size: 32px; margin-bottom: 8px; }
    .empty-state .msg { font-size: 14px; font-weight: 600; }

    .x-badge {
      display: inline-flex; align-items: center; gap: 3px;
      background: rgba(29,155,240,0.12); color: #1d9bf0;
      padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600;
    }

    .actions-row {
      padding: 0 18px 10px; display: none; align-items: center; gap: 8px;
    }
    .actions-row.show { display: flex; }
    .actions-row .count { color: #a5b4fc; font-size: 12px; font-weight: 600; }
    .actions-row button {
      padding: 4px 10px; border-radius: 6px; border: none; cursor: pointer;
      font-size: 11px; font-family: 'DM Sans', sans-serif;
    }
    .delete-btn {
      background: rgba(239,68,68,0.15); color: #fca5a5;
      border: 1px solid rgba(239,68,68,0.3) !important;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    </div>
    <div>
      <div class="header-title">BookmarkBuddy</div>
      <div class="header-count" id="totalCount">Loading…</div>
    </div>
    <div class="header-actions">
      <button id="openSidePanel" title="Open Side Panel">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
        Panel
      </button>
      <button id="openFullPage" title="Open Full Page">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Full
      </button>
    </div>
  </div>

  <!-- Search -->
  <div class="search-bar">
    <div class="search-wrap">
      <div class="search-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </div>
      <input type="text" id="searchInput" placeholder="Search bookmarks…">
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="all">All <span class="tab-count" id="allCount">0</span></button>
    <button class="tab" data-tab="bar">Bar <span class="tab-count" id="barCount">0</span></button>
    <button class="tab" data-tab="other">Other <span class="tab-count" id="otherCount">0</span></button>
    <button class="tab" data-tab="mobile">Mobile <span class="tab-count" id="mobileCount">0</span></button>
    <button class="tab" data-tab="favorites">Favs <span class="tab-count" id="favCount">0</span></button>
    <button class="tab tab-x" data-tab="x-posts">𝕏 <span class="tab-count" id="xCount">0</span></button>
  </div>

  <!-- Controls -->
  <div class="controls">
    <select id="sortSelect">
      <option value="newest">Newest</option>
      <option value="oldest">Oldest</option>
      <option value="alpha">A → Z</option>
    </select>
    <select id="categoryFilter">
      <option value="All">All Categories</option>
    </select>
  </div>

  <!-- Bulk Actions -->
  <div class="actions-row" id="actionsRow">
    <span class="count" id="selectedCount">0 selected</span>
    <button class="delete-btn" id="deleteSelected">Delete</button>
  </div>

  <!-- Bookmark List -->
  <div class="bookmark-list" id="bookmarkList"></div>

  <script src="popup.js"></script>
</body>
</html>
