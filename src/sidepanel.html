<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookmarkBuddy - Side Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="themes.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font);
      display: flex; flex-direction: column;
      height: 100vh;
    }
    .header {
      padding: 16px 18px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-text));
      display: flex; align-items: center; justify-content: center;
    }
    .header-icon svg { stroke: #fff; }
    .header-title { font-size: 16px; font-weight: 700; }
    .header-count { color: var(--text-secondary); font-size: 12px; }
    .open-full {
      margin-left: auto; background: var(--accent-light);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text-secondary); cursor: pointer; padding: 6px 10px;
      display: flex; align-items: center; font-size: 11px; gap: 4px;
      font-family: var(--font);
    }
    .open-full:hover { background: var(--sidebar-hover); color: var(--accent-text); }

    .search-bar { padding: 10px 18px; flex-shrink: 0; }
    .search-wrap { position: relative; }
    .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--text-tertiary); display: flex;
    }
    .search-bar input {
      width: 100%; padding: 9px 12px 9px 34px;
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text-primary); font-size: 13px; outline: none;
      font-family: var(--font);
    }
    .search-bar input::placeholder { color: var(--text-tertiary); }

    .tabs {
      display: flex; gap: 2px; padding: 0 18px 10px; flex-shrink: 0; flex-wrap: wrap;
    }
    .tab {
      padding: 5px 12px; border-radius: 8px; border: none; cursor: pointer;
      background: transparent; color: var(--text-secondary); font-size: 12px; font-weight: 600;
      font-family: var(--font); transition: all 0.15s;
    }
    .tab.active { background: var(--accent-light); color: var(--accent-text); }
    .tab-count {
      display: inline-block; background: var(--badge-bg);
      padding: 0px 6px; border-radius: 4px; font-size: 10px; margin-left: 4px;
    }
    .tab.active .tab-count { background: var(--select-accent); }
    .tab-x.active { background: var(--x-bg); color: var(--x-color); }
    .tab-x .tab-count { background: var(--x-bg); }
    .tab-x.active .tab-count { background: var(--select-accent); }

    .controls {
      display: flex; gap: 6px; padding: 0 18px 10px; flex-shrink: 0;
    }
    .controls select {
      padding: 5px 8px; background: var(--card-bg);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text-primary); font-size: 11px; cursor: pointer;
      font-family: var(--font); outline: none; flex: 1;
    }
    .controls select option { background: var(--sidebar-bg); }

    .bookmark-list { flex: 1; overflow-y: auto; padding: 0 12px 12px; }
    .bookmark-list::-webkit-scrollbar { width: 6px; }
    .bookmark-list::-webkit-scrollbar-track { background: transparent; }
    .bookmark-list::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

    .bookmark-card {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 12px; border-radius: 12px; cursor: pointer;
      transition: all 0.15s; border: 1px solid var(--card-border);
      margin-bottom: 4px; position: relative;
    }
    .bookmark-card:hover { background: var(--card-hover); border-color: var(--card-hover-border); }

    .bk-favicon {
      width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
      background: var(--badge-bg); display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .bk-favicon img { width: 100%; height: 100%; object-fit: cover; }
    .bk-favicon .fallback { font-size: 14px; font-weight: 700; color: var(--text-primary); display: none; }

    .bk-info { flex: 1; min-width: 0; }
    .bk-title {
      font-size: 13px; font-weight: 500; color: var(--text-primary);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; line-height: 1.4;
    }
    .bk-title-link { cursor: pointer; }
    .bk-title-link:hover { text-decoration: underline; color: var(--accent-text); }
    .bk-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-top: 4px; }
    .bk-domain { font-size: 11px; color: var(--text-secondary); font-family: var(--mono); }
    .bk-category {
      font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 500;
    }
    .bk-time { font-size: 11px; color: var(--text-tertiary); }
    .x-badge {
      display: inline-flex; align-items: center; gap: 3px;
      background: var(--x-bg); color: var(--x-color);
      padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600;
    }
    .x-preview {
      margin-top: 6px; padding: 8px 10px; background: var(--x-bg);
      border-radius: 8px; border-left: 2px solid var(--accent);
      font-size: 12px; color: var(--text-secondary); line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .x-author { color: var(--accent-text); font-weight: 600; font-size: 11px; margin-bottom: 2px; }

    .card-actions {
      position: absolute; top: 8px; right: 8px;
      display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s;
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 2px;
    }
    .bookmark-card:hover .card-actions { opacity: 1; }
    .card-actions button {
      background: none; border: none; cursor: pointer; padding: 5px;
      display: flex; color: var(--text-secondary); border-radius: 6px;
    }
    .card-actions button:hover { background: var(--sidebar-hover); }
    .card-actions button.fav-active { color: var(--fav-color); }
    .card-actions button.delete-btn:hover { color: var(--danger); }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
    .empty-state .emoji { font-size: 32px; margin-bottom: 8px; }
    .empty-state .msg { font-size: 14px; font-weight: 600; }
    .empty-state .sub { font-size: 12px; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    </div>
    <div>
      <div class="header-title">BookmarkBuddy</div>
      <div class="header-count" id="totalCount">Loading…</div>
    </div>
    <button class="open-full" id="openFullPage">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Full Page
    </button>
  </div>

  <div class="search-bar">
    <div class="search-wrap">
      <div class="search-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </div>
      <input type="text" id="searchInput" placeholder="Search bookmarks…">
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="all">All <span class="tab-count" id="allCount">0</span></button>
    <button class="tab" data-tab="bar">Bar <span class="tab-count" id="barCount">0</span></button>
    <button class="tab" data-tab="other">Other <span class="tab-count" id="otherCount">0</span></button>
    <button class="tab" data-tab="mobile">Mobile <span class="tab-count" id="mobileCount">0</span></button>
    <button class="tab" data-tab="favorites">⭐ Favs <span class="tab-count" id="favCount">0</span></button>
    <button class="tab tab-x" data-tab="x-posts">𝕏 Posts <span class="tab-count" id="xCount">0</span></button>
  </div>

  <div class="controls">
    <select id="sortSelect">
      <option value="newest">Newest</option>
      <option value="oldest">Oldest</option>
      <option value="alpha">A → Z</option>
    </select>
    <select id="categoryFilter">
      <option value="All">All Categories</option>
    </select>
  </div>

  <div class="bookmark-list" id="bookmarkList"></div>

  <script src="sidepanel.js"></script>
</body>
</html>
