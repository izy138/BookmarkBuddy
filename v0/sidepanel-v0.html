<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookmarkBuddy - Side Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b1121;
      color: #f1f5f9;
      font-family: 'DM Sans', -apple-system, sans-serif;
      display: flex; flex-direction: column;
      height: 100vh;
    }
    .header {
      padding: 16px 18px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .header-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
    }
    .header-title { font-size: 16px; font-weight: 700; }
    .header-count { color: #64748b; font-size: 12px; }
    .open-full {
      margin-left: auto; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
      color: #94a3b8; cursor: pointer; padding: 6px 10px;
      display: flex; align-items: center; font-size: 11px; gap: 4px;
      font-family: 'DM Sans', sans-serif;
    }
    .open-full:hover { background: rgba(99,102,241,0.15); color: #a5b4fc; }

    .search-bar { padding: 10px 18px; flex-shrink: 0; }
    .search-wrap { position: relative; }
    .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: #64748b; display: flex;
    }
    .search-bar input {
      width: 100%; padding: 9px 12px 9px 34px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; color: #f1f5f9; font-size: 13px; outline: none;
      font-family: 'DM Sans', sans-serif;
    }
    .search-bar input::placeholder { color: #475569; }

    .tabs {
      display: flex; gap: 2px; padding: 0 18px 10px; flex-shrink: 0; flex-wrap: wrap;
    }
    .tab {
      padding: 5px 12px; border-radius: 8px; border: none; cursor: pointer;
      background: transparent; color: #64748b; font-size: 12px; font-weight: 600;
      font-family: 'DM Sans', sans-serif; transition: all 0.15s;
    }
    .tab.active { background: rgba(99,102,241,0.15); color: #a5b4fc; }
    .tab-count {
      display: inline-block; background: rgba(255,255,255,0.06);
      padding: 0px 6px; border-radius: 4px; font-size: 10px; margin-left: 4px;
    }
    .tab.active .tab-count { background: rgba(99,102,241,0.3); }

    .controls {
      display: flex; gap: 6px; padding: 0 18px 10px; flex-shrink: 0;
    }
    .controls select {
      padding: 5px 8px; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
      color: #f1f5f9; font-size: 11px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; outline: none; flex: 1;
    }
    .controls select option { background: #1e293b; }

    .bookmark-list { flex: 1; overflow-y: auto; padding: 0 12px 12px; }
    .bookmark-list::-webkit-scrollbar { width: 6px; }
    .bookmark-list::-webkit-scrollbar-track { background: transparent; }
    .bookmark-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    .bookmark-card {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 12px; border-radius: 12px; cursor: pointer;
      transition: all 0.15s; border: 1px solid rgba(255,255,255,0.04);
      margin-bottom: 4px; position: relative;
    }
    .bookmark-card:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); }

    .bk-favicon {
      width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
      background: #1e293b; display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .bk-favicon img { width: 100%; height: 100%; object-fit: cover; }
    .bk-favicon .fallback { font-size: 14px; font-weight: 700; color: #fff; display: none; }

    .bk-info { flex: 1; min-width: 0; }
    .bk-title {
      font-size: 13px; font-weight: 500; color: #f1f5f9;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; line-height: 1.4;
    }
    .bk-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-top: 4px; }
    .bk-domain { font-size: 11px; color: #64748b; font-family: 'JetBrains Mono', monospace; }
    .bk-category {
      font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 500;
    }
    .bk-time { font-size: 11px; color: #475569; }
    .x-badge {
      display: inline-flex; align-items: center; gap: 3px;
      background: rgba(29,155,240,0.12); color: #1d9bf0;
      padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600;
    }
    .x-preview {
      margin-top: 6px; padding: 8px 10px; background: rgba(29,155,240,0.06);
      border-radius: 8px; border-left: 2px solid rgba(29,155,240,0.3);
      font-size: 12px; color: #94a3b8; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .x-author { color: #1d9bf0; font-weight: 600; font-size: 11px; margin-bottom: 2px; }

    .card-actions {
      position: absolute; top: 8px; right: 8px;
      display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s;
      background: rgba(11,17,33,0.9); border-radius: 8px; padding: 2px;
    }
    .bookmark-card:hover .card-actions { opacity: 1; }
    .card-actions button {
      background: none; border: none; cursor: pointer; padding: 5px;
      display: flex; color: #94a3b8; border-radius: 6px;
    }
    .card-actions button:hover { background: rgba(255,255,255,0.08); }
    .card-actions button.fav-active { color: #f59e0b; }
    .card-actions button.delete-btn:hover { color: #ef4444; }

    .empty-state { text-align: center; padding: 40px 20px; color: #64748b; }
    .empty-state .emoji { font-size: 32px; margin-bottom: 8px; }
    .empty-state .msg { font-size: 14px; font-weight: 600; }
    .empty-state .sub { font-size: 12px; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    </div>
    <div>
      <div class="header-title">BookmarkBuddy</div>
      <div class="header-count" id="totalCount">Loading…</div>
    </div>
    <button class="open-full" id="openFullPage">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Full Page
    </button>
  </div>

  <div class="search-bar">
    <div class="search-wrap">
      <div class="search-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </div>
      <input type="text" id="searchInput" placeholder="Search bookmarks…">
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="all">All <span class="tab-count" id="allCount">0</span></button>
    <button class="tab" data-tab="favorites">⭐ Favs <span class="tab-count" id="favCount">0</span></button>
    <button class="tab" data-tab="x-posts">𝕏 Posts <span class="tab-count" id="xCount">0</span></button>
    <button class="tab" data-tab="duplicates">Dupes <span class="tab-count" id="dupeCount">0</span></button>
  </div>

  <div class="controls">
    <select id="sortSelect">
      <option value="newest">Newest</option>
      <option value="oldest">Oldest</option>
      <option value="alpha">A → Z</option>
    </select>
    <select id="categoryFilter">
      <option value="All">All Categories</option>
    </select>
  </div>

  <div class="bookmark-list" id="bookmarkList"></div>

  <script src="sidepanel.js"></script>
</body>
</html>
